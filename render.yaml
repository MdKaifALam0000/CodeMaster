services:
  - type: web
    name: codemaster-backend
    env: node
    plan: starter
    buildCommand: cd Backend && npm install
    startCommand: cd Backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: REDIS_PASSWORD
        sync: false
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CLOUD_API_KEY
        sync: false
      - key: CLOUD_API_SECRET
        sync: false
      - key: CLOUD_NAME
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RAPIDAPI_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false

  - type: static
    name: codemaster-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    publishDir: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: codemaster-backend
          property: url
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
